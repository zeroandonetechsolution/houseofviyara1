<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>House Of Viyara | Admin Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
    <style>
        /* Preloader override for admin */
        #preloader {
            position: fixed; inset: 0; z-index: 9999;
            background: #0f1117;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 18px; transition: opacity 0.5s;
        }
        #preloader.fade-out { opacity: 0; pointer-events: none; }
        .admin-pre-logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.3rem; color: #fff;
            animation: pulse 1.5s infinite;
        }
        .admin-pre-text { color: #7a89a8; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.9rem; letter-spacing: 0.1em; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="admin-pre-logo">HOV</div>
        <div class="admin-pre-text">ADMIN PORTAL</div>
    </div>
    <div id="admin-root"></div>
    <script>
        if (!window.API_URL && ['localhost', '127.0.0.1'].includes(window.location.hostname)) {
            window.API_URL = 'http://127.0.0.1:3000';
        }
    </script>
    <script src="admin.js?v=2"></script>
</body>
</html>
