<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Of Viyara | Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-page">
    <!-- Use heic2any only with multiple CDNs as fallback and strong cache-busting -->
    <!-- Primary CDN -->
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.10/dist/heic2any.min.js?v=2"></script>
    <!-- Fallback CDN 1 -->
    <script>
        if (!window.heic2any) {
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/heic2any@0.0.10/dist/heic2any.min.js?v=2';
            document.head.appendChild(script);
        }
    </script>
    <!-- Fallback CDN 2 -->
    <script>
        setTimeout(() => {
            if (!window.heic2any) {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/heic2any/0.0.10/heic2any.min.js?v=2';
                document.head.appendChild(script);
            }
        }, 100);
    </script>
    <script src="supabase-config.js?v=10"></script>
    <script src="admin.js?v=46"></script>
</body>
</html>
