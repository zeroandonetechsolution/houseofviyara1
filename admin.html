<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Of Viyara | Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
    <style>
      .admin-file-input { margin-top: 10px; }
      .admin-thumb { width: 80px; height: 60px; object-fit: cover; border-radius: 8px; }
      .admin-section-card { background: #fff; border: 4px solid #000; box-shadow: 6px 6px 0 #000; padding: 24px; margin-bottom: 20px; }
      .admin-stats-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
      .admin-stat-card { padding: 18px; border: 4px solid #000; background: #fefefe; font-weight: 900; }
      .admin-table-wrap { overflow-x: auto; }
      .admin-table { width: 100%; border-collapse: collapse; }
      .admin-table th, .admin-table td { padding: 14px 12px; border: 3px solid #000; text-align: left; }
      .admin-form { display: grid; gap: 16px; }
      .aform-group label { display: block; margin-bottom: 8px; font-weight: 700; }
      .aform-input { width: 100%; border: 4px solid #000; padding: 14px 16px; font-size: 0.95rem; }
      .aform-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
      .aform-actions { display: flex; gap: 12px; flex-wrap: wrap; }
      .admin-btn { padding: 12px 18px; font-weight: 900; border: 4px solid #000; background: #000; color: #fff; cursor: pointer; }
      .admin-btn-ghost { background: #fff; color: #000; }
      .admin-btn-danger { background: #ff007a; border-color: #000; }
      .admin-btn-sm { font-size: 0.85rem; padding: 8px 10px; }
      .admin-banners-grid { display: grid; gap: 18px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
      .admin-banner-card { border: 4px solid #000; padding: 14px; background: #fff; }
      .abc-img-wrap img { width: 100%; height: 180px; object-fit: cover; }
      .abc-meta { margin-top: 12px; }
      .abc-actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
      .admin-toast { position: fixed; bottom: 24px; right: 24px; background: #000; color: #fff; padding: 12px 16px; border-radius: 8px; opacity: 0; transform: translateY(10px); transition: all 0.25s ease; z-index: 9999; }
      .admin-toast.show { opacity: 1; transform: translateY(0); }
      .admin-toast-error { background: #ff0037; }
    </style>
</head>
<body>
    <script src="admin-function.js"></script>
</body>
</html>
