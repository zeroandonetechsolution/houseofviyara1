<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House Of Viyara | Admin Panel</title>
  <link rel="stylesheet" href="admin.css">
  <style>
    body { background: #f5f5f7; }
    .admin-shell { min-height: 100vh; }
    .admin-main { padding: 24px; }
    .admin-section-card { background: #fff; border: 1px solid #e6e6e8; border-radius: 16px; padding: 24px; }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th, .admin-table td { padding: 12px 10px; border-bottom: 1px solid #eaeaea; text-align: left; }
    .admin-empty-state { padding: 40px; text-align: center; color: #777; }
    .admin-form { max-width: 680px; }
    .aform-group label { display: block; margin-bottom: 8px; font-weight: 700; }
    .aform-input, .aform-textarea, .aform-select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; background: #fff; }
    .aform-actions { margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
    .admin-toast { font-size: .95rem; }
    .admin-img-thumb { width: 82px; height: 72px; object-fit: cover; border-radius: 12px; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-sidebar-logo">
        <div class="sidebar-logo-icon">HOV</div>
        <div class="sidebar-logo-text">
          <strong>House Of Viyara</strong>
          <span>Admin Panel</span>
        </div>
      </div>
      <nav class="admin-nav">
        <a class="admin-nav-item active" id="nav-dashboard" onclick="navigateTo('dashboard')"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
        <a class="admin-nav-item" id="nav-products" onclick="navigateTo('products')"><i class="fas fa-box-open"></i><span>Products</span></a>
        <a class="admin-nav-item" id="nav-banners" onclick="navigateTo('banners')"><i class="fas fa-image"></i><span>Banners</span></a>
      </nav>
      <div class="admin-sidebar-footer">
        <a href="index.html" class="sidebar-footer-link"><i class="fas fa-external-link-alt"></i> View Store</a>
      </div>
    </aside>
    <div class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar-title" id="topbar-title">Dashboard</div>
        <div class="admin-topbar-actions" id="topbar-actions"></div>
      </header>
      <main class="admin-content" id="admin-content"></main>
    </div>
  </div>

  <div class="admin-modal-overlay" id="modal-overlay" onclick="closeModal()"></div>
  <div class="admin-modal" id="admin-modal">
    <button class="admin-modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    <div class="admin-modal-body" id="modal-body"></div>
  </div>
  <div id="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" integrity="sha512-aFwwKXPypWHVdSdpWgXg9Mc+0SVYbO9+p3X1v8cZZW2+FQ1zGpsSg4yj4BS9iTQ9FKsyYNRa4npOyY1NSHtYtw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="admin-function.js"></script>
  <script>initAdminPanel();</script>
</body>
</html>
